project_id = "xkgffegenrvitalgncnt"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = []
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = false  # Apple Sign In 외 가입 차단

# auth.external.apple은 Supabase Studio에서 직접 설정 (client_id, secret 필요)
# 본 config는 함수 deploy 용도만 — auth 설정은 별도

[edge_runtime]
enabled = true
inspector_port = 8083

# 내부 호출 전용 함수 (verify_jwt = false, INTERNAL_CALL_TOKEN로 인증)
[functions.llm-prompt-c-postedit]
verify_jwt = false

[functions.normalization-worker]
verify_jwt = false

[functions.matching-algorithm]
verify_jwt = false

[functions.explanation-payload-builder]
verify_jwt = false

[functions.recommendation-matrix-engine]
verify_jwt = false

[functions.post-polish-validation]
verify_jwt = false

[functions.raw-quote-detector]
verify_jwt = false

