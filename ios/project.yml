name: Gyeol
options:
  bundleIdPrefix: com.gyeol
  deploymentTarget:
    iOS: "17.0"
configs:
  Debug: debug
  Release: release
packages:
  GyeolPackage:
    path: .
targets:
  GyeolApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    configFiles:
      Debug: Gyeol/Resources/Gyeol.xcconfig
      Release: Gyeol/Resources/Gyeol.xcconfig
    sources:
      - path: Gyeol/App
      - path: Gyeol/Resources/LaunchScreen.storyboard
      - path: Gyeol/Resources/Tokens.xcassets
      - path: Gyeol/Resources/Fonts
        type: folder
    dependencies:
      - package: GyeolPackage
        product: GyeolCore
      - package: GyeolPackage
        product: GyeolDomain
      - package: GyeolPackage
        product: GyeolUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gyeol.app
        PRODUCT_NAME: Gyeol
        INFOPLIST_FILE: Gyeol/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Gyeol/Resources/Gyeol.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "W4T837AHL3"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
      configs:
        Debug:
          # ADR-017: enables raw text logging via GyLog.trace.traceText (#if DEBUG && GYEOL_TRACE_RAW).
          # Release omits this flag; bodies compile away.
          OTHER_SWIFT_FLAGS: "$(inherited) -D GYEOL_TRACE_RAW"
schemes:
  GyeolApp:
    build:
      targets:
        GyeolApp: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: false
      targets: []
